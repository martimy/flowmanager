<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meter Control</title>
  <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="js/vue.min.js"></script>
  <script src="js/layout.js"></script>
  <style>
    :root {
      --pcolor-0: #185FA5; --pcolor-1: #85B7EB; --pcolor-2: #378ADD;
      --pcolor-3: #0C447C; --pcolor-4: #042C53;
      --scolor-0: #7F77DD; --scolor-1: #EEEDFE; --scolor-2: #AFA9EC;
      --scolor-3: #534AB7; --scolor-4: #3C3489;
      --white: #ffffff;
      --bg:         #f0f4fa;
      --bg-card:    #ffffff;
      --bg-sidebar: var(--pcolor-4);
      --text-main:  var(--pcolor-4);
      --text-muted: #6b7fa3;
      --text-light: #a0aec0;
      --border:     #dde3f0;
      --radius:     10px;
      --shadow:     0 2px 12px rgba(24,95,165,0.08);
      --shadow-md:  0 4px 24px rgba(24,95,165,0.13);
      --danger:     #b91c1c;
      --danger-bg:  #fef2f2;
      --danger-bdr: #fecaca;
      --warn-bg:    #fffbeb;
      --warn-bdr:   #fde68a;
      --warn-text:  #92400e;
      --success-bg: #f0fdf4;
      --success-bdr:#bbf7d0;
      --success:    #166534;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px; min-height: 100vh; background: var(--bg-sidebar);
      display: flex; flex-direction: column; flex-shrink: 0;
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 10px;
      padding: 24px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-brand svg { width: 28px; height: 28px; flex-shrink: 0; }
    .sidebar-brand-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--white); letter-spacing: 0.02em; line-height: 1.2; }
    .sidebar-brand-sub  { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--pcolor-1); letter-spacing: 0.12em; text-transform: uppercase; }
    .sidebar-nav { flex: 1; padding: 16px 0; overflow-y: auto; }
    .nav-section-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--pcolor-2); padding: 10px 20px 4px; }
    .nav-link { display: flex; align-items: center; gap: 10px; padding: 9px 20px; color: rgba(255,255,255,0.65); text-decoration: none; font-size: 13.5px; font-weight: 400; transition: background 0.15s, color 0.15s; border-left: 3px solid transparent; }
    .nav-link:hover { background: rgba(255,255,255,0.06); color: var(--white); }
    .nav-link.active { background: rgba(133,183,235,0.15); color: var(--white); border-left-color: var(--pcolor-1); font-weight: 500; }
    .nav-link svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.7; }
    .nav-link.active svg { opacity: 1; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); }
    .sidebar-clock { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--pcolor-1); }

    /* ── Main ── */
    .main { margin-left: 200px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Topbar ── */
    .topbar {
      background: var(--bg-card); border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
    .topbar-right  { display: flex; align-items: center; gap: 10px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; border: none; border-radius: 7px;
      font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 500;
      cursor: pointer; transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn svg { width: 14px; height: 14px; flex-shrink: 0; }
    .btn-primary { background: var(--pcolor-0); color: var(--white); box-shadow: 0 1px 4px rgba(24,95,165,0.18); }
    .btn-primary:hover { background: var(--pcolor-3); }
    .btn-primary:disabled { background: #a0aec0; cursor: not-allowed; box-shadow: none; }
    .btn-secondary { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); color: var(--text-main); }
    .btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-bdr); }
    .btn-danger:hover { background: #fee2e2; }
    .btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 5px; }
    .btn-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; padding: 0;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg); color: var(--text-muted); cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .btn-icon:hover { background: var(--danger-bg); color: var(--danger); border-color: var(--danger-bdr); }
    .btn-icon svg { width: 13px; height: 13px; }

    /* ── Page body ── */
    .page-body { padding: 28px 32px 60px; flex: 1; max-width: 860px; }

    /* ── Import banner ── */
    .import-banner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px; border-radius: var(--radius); margin-bottom: 22px;
      background: var(--warn-bg); border: 1px solid var(--warn-bdr);
      color: var(--warn-text); font-size: 13px;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Section card ── */
    .section-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      margin-bottom: 18px; overflow: hidden;
      animation: fadeUp 0.3s ease both;
    }
    .section-card:nth-child(1) { animation-delay: 0.04s; }
    .section-card:nth-child(2) { animation-delay: 0.08s; }
    .section-card:nth-child(3) { animation-delay: 0.12s; }
    .section-card:nth-child(4) { animation-delay: 0.16s; }

    .section-head {
      padding: 14px 20px 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .section-title {
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--text-main); letter-spacing: 0.02em; text-transform: uppercase;
    }
    .section-body { padding: 18px 20px; }

    /* ── Field rows ── */
    .field-row {
      display: flex; align-items: center;
      gap: 12px; margin-bottom: 14px;
    }
    .field-row:last-child { margin-bottom: 0; }

    .field-label {
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      width: 110px; flex-shrink: 0;
    }

    .field-input {
      flex: 1;
      font-family: 'DM Sans', sans-serif; font-size: 13.5px;
      padding: 7px 11px; border: 1.5px solid var(--border);
      border-radius: 7px; background: var(--bg);
      color: var(--text-main);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    .field-input:focus { border-color: var(--pcolor-1); box-shadow: 0 0 0 3px rgba(24,95,165,0.09); background: var(--white); }
    .field-input:disabled { background: var(--border); color: var(--text-light); cursor: not-allowed; }
    .field-input.invalid { border-color: var(--danger); background: var(--danger-bg); }

    select.field-input { cursor: pointer; }

    .field-hint { font-size: 11.5px; color: var(--text-light); margin-top: 2px; }
    .field-error { font-size: 11.5px; color: var(--danger); margin-top: 2px; }

    /* ── Flags grid ── */
    .flags-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .flag-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 8px;
      border: 1.5px solid var(--border);
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .flag-item:hover { border-color: var(--pcolor-1); background: #f0f7ff; }
    .flag-item.checked { border-color: var(--pcolor-0); background: #eff6ff; }
    .flag-item input[type="checkbox"] { display: none; }
    .flag-checkmark {
      width: 16px; height: 16px; border-radius: 4px;
      border: 2px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .flag-item.checked .flag-checkmark { border-color: var(--pcolor-0); background: var(--pcolor-0); }
    .flag-checkmark svg { width: 10px; height: 10px; color: white; opacity: 0; transition: opacity 0.1s; }
    .flag-item.checked .flag-checkmark svg { opacity: 1; }
    .flag-label { font-size: 13px; color: var(--text-main); }
    .flag-sub   { font-size: 11px; color: var(--text-muted); }

    /* ── Operation radio ── */
    .op-grid { display: flex; gap: 10px; }

    .op-item {
      flex: 1; display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 8px;
      border: 1.5px solid var(--border);
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .op-item:hover { border-color: var(--pcolor-1); background: #f0f7ff; }
    .op-item.selected { border-color: var(--pcolor-0); background: #eff6ff; }
    .op-item.selected.op-del { border-color: var(--danger); background: var(--danger-bg); }
    .op-item input[type="radio"] { display: none; }
    .op-dot {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }
    .op-item.selected .op-dot { border-color: var(--pcolor-0); }
    .op-item.selected.op-del .op-dot { border-color: var(--danger); }
    .op-inner { width: 8px; height: 8px; border-radius: 50%; background: transparent; transition: background 0.15s; }
    .op-item.selected .op-inner { background: var(--pcolor-0); }
    .op-item.selected.op-del .op-inner { background: var(--danger); }
    .op-text { font-size: 13px; font-weight: 500; color: var(--text-main); }

    /* ── Bands table ── */
    .bands-table { width: 100%; border-collapse: collapse; }
    .bands-table th {
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted); text-align: left;
      padding: 6px 10px 8px; border-bottom: 2px solid var(--border);
      font-weight: 500; white-space: nowrap;
    }
    .bands-table td { padding: 6px 6px; vertical-align: middle; }
    .bands-table tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
    .bands-table tr:hover td { background: #f8faff; }

    .band-type-input {
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      padding: 6px 10px; border: 1.5px solid var(--border);
      border-radius: 6px; background: var(--bg); color: var(--text-main);
      width: 140px; outline: none; transition: border-color 0.15s;
    }
    .band-type-input:focus { border-color: var(--pcolor-1); background: var(--white); }

    .band-num-input {
      font-family: 'DM Mono', monospace; font-size: 13px;
      padding: 6px 10px; border: 1.5px solid var(--border);
      border-radius: 6px; background: var(--bg); color: var(--text-main);
      width: 90px; outline: none; transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    .band-num-input::-webkit-outer-spin-button,
    .band-num-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .band-num-input:focus { border-color: var(--pcolor-1); background: var(--white); }
    .band-num-input:disabled { background: var(--border); color: var(--text-light); cursor: not-allowed; }

    .add-band-row { margin-top: 12px; }

    /* ── Form actions bar ── */
    .form-actions {
      display: flex; align-items: center; gap: 10px;
      padding: 18px 0 0;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    /* ── Result banner ── */
    .result-banner {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 12px 18px; border-radius: var(--radius);
      margin-top: 18px; font-size: 13px; font-weight: 500;
      animation: fadeUp 0.3s ease;
    }
    .result-banner.success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-bdr); }
    .result-banner.error   { background: var(--danger-bg);  color: var(--danger);  border: 1px solid var(--danger-bdr); }
    .result-banner svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

    /* ── Snackbar ── */
    #snackbar {
      visibility: hidden; min-width: 250px;
      background: var(--pcolor-4); color: white;
      text-align: center; border-radius: 8px;
      padding: 12px 20px; position: fixed; z-index: 999;
      left: 50%; bottom: 30px; transform: translateX(-50%);
      font-size: 13px; box-shadow: 0 4px 20px rgba(4,44,83,0.25);
    }
    #snackbar.show { visibility: visible; animation: snackin 0.3s, snackout 0.4s 2.6s; }
    @keyframes snackin  { from{bottom:10px;opacity:0} to{bottom:30px;opacity:1} }
    @keyframes snackout { from{bottom:30px;opacity:1} to{bottom:10px;opacity:0} }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Sidebar ── -->
  <app-sidebar :current-time=currentTime></app-sidebar>

  <!-- ── Main ── -->
  <div class="main">
    <app-topbar-sw title="Meter Control" :num-switches="switches.length"></app-topbar-sw>

    <main class="page-body">

      <!-- Import banner -->
      <div v-if="hasImport" class="import-banner">
        <div>
          <strong>Saved meter entry available.</strong>
          Import it to pre-fill this form.
        </div>
        <button class="btn btn-sm btn-secondary" @click="importFromSession">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 2v8M4 7l4 4 4-4M2 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
          Import
        </button>
      </div>

      <!-- ── Section 1: Target ── -->
      <div class="section-card">
        <div class="section-head">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="var(--scolor-3)"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="8" cy="8" r="2.5" fill="currentColor"/></svg>
          <span class="section-title">Target</span>
        </div>
        <div class="section-body">
          <div class="field-row">
            <label class="field-label" for="dpid">Switch</label>
            <select id="dpid" class="field-input" v-model="form.dpid" :class="{ invalid: errors.dpid }">
              <option value="" disabled>Select a switch…</option>
              <option v-for="sw in switches" :key="sw" :value="sw">SW_{{ sw }}</option>
            </select>
            <span v-if="errors.dpid" class="field-error">{{ errors.dpid }}</span>
          </div>
          <div class="field-row">
            <label class="field-label" for="meter_id">Meter ID</label>
            <input
              id="meter_id" type="number" class="field-input"
              :class="{ invalid: errors.meter_id }"
              v-model.number="form.meter_id"
              min="1" max="4294901760"
              placeholder="1 – 4294901760"
            >
            <span v-if="errors.meter_id" class="field-error">{{ errors.meter_id }}</span>
          </div>
        </div>
      </div>

      <!-- ── Section 2: Flags ── -->
      <div class="section-card">
        <div class="section-head">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="var(--scolor-3)"><path d="M3 2v12M3 2l9 3-9 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
          <span class="section-title">Flags</span>
        </div>
        <div class="section-body">
          <div class="flags-grid">
            <label
              v-for="flag in FLAGS"
              :key="flag.id"
              class="flag-item"
              :class="{ checked: form.flags[flag.id] }"
              @click="toggleFlag(flag.id)"
            >
              <!--input type="checkbox" :checked="form.flags[flag.id]"-->
              <div class="flag-checkmark">
                <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M1.5 5l2.5 2.5 4.5-4"/>
                </svg>
              </div>
              <div>
                <div class="flag-label">{{ flag.label }}</div>
                <div class="flag-sub">{{ flag.hint }}</div>
              </div>
            </label>
          </div>
          <div v-if="errors.flags" style="margin-top:10px" class="field-error">{{ errors.flags }}</div>
        </div>
      </div>

      <!-- ── Section 3: Operation ── -->
      <div class="section-card">
        <div class="section-head">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="var(--scolor-3)"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
          <span class="section-title">Operation</span>
        </div>
        <div class="section-body">
          <div class="op-grid">
            <label
              v-for="op in OPERATIONS"
              :key="op.value"
              class="op-item"
              :class="{ selected: form.operation === op.value, 'op-del': op.value === 'del' && form.operation === 'del' }"
              @click="form.operation = op.value"
            >
              <input type="radio" :value="op.value" v-model="form.operation">
              <div class="op-dot"><div class="op-inner"></div></div>
              <div class="op-text">{{ op.label }}</div>
            </label>
          </div>
        </div>
      </div>

      <!-- ── Section 4: Meter Bands ── -->
      <div class="section-card" v-show="form.operation !== 'del'">
        <div class="section-head">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="var(--scolor-3)"><rect x="2" y="10" width="3" height="4" rx="1"/><rect x="6.5" y="6" width="3" height="8" rx="1"/><rect x="11" y="2" width="3" height="12" rx="1"/></svg>
          <span class="section-title">Meter Bands</span>
        </div>
        <div class="section-body">
          <div v-if="errors.bands" class="field-error" style="margin-bottom:10px">{{ errors.bands }}</div>

          <table class="bands-table" v-if="form.bands.length > 0">
            <thead>
              <tr>
                <th>Band Type</th>
                <th>Rate</th>
                <th>Burst Size</th>
                <th>Prec Level</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="(band, idx) in form.bands" :key="idx">
                <td>
                  <input
                    list="bandtype-list"
                    class="band-type-input"
                    v-model="band.type"
                    placeholder="DROP"
                    @change="onBandTypeChange(band)"
                  >
                </td>
                <td>
                  <input
                    type="number" class="band-num-input"
                    v-model.number="band.rate"
                    min="0" placeholder="0"
                  >
                </td>
                <td>
                  <input
                    type="number" class="band-num-input"
                    v-model.number="band.burst"
                    min="0" placeholder="0"
                    :disabled="!form.flags.OFPMF_BURST"
                  >
                </td>
                <td>
                  <input
                    type="number" class="band-num-input"
                    v-model.number="band.prec"
                    min="0" max="63" placeholder="0"
                    :disabled="band.type !== 'DSCP_REMARK'"
                  >
                </td>
                <td>
                  <button class="btn-icon" @click="removeBand(idx)" title="Remove band">
                    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M5 3h6l1 1H4L5 3zm-1 2h8l-.75 8H4.75L4 5zm3 2v5h1V7H7zm2 0v5h1V7H9z"/></svg>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>

          <datalist id="bandtype-list">
            <option value="DROP">
            <option value="DSCP_REMARK">
          </datalist>

          <div class="add-band-row">
            <button class="btn btn-secondary btn-sm" @click="addBand">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
              Add Band
            </button>
            <span v-if="form.bands.length === 0" style="margin-left:10px;font-size:12px;color:var(--text-muted)">
              At least one band required for Add/Modify
            </span>
          </div>
        </div>
      </div>

      <!-- ── Form actions ── -->
      <div class="form-actions">
        <button
          class="btn btn-primary"
          @click="submitForm"
          :disabled="submitting"
        >
          <svg v-if="submitting" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="animation:spin 0.8s linear infinite">
            <path d="M13.5 8a5.5 5.5 0 11-1.1-3.3"/><path d="M13.5 2v3h-3"/>
          </svg>
          <svg v-else viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M13.5 8a5.5 5.5 0 11-1.1-3.3"/><path d="M2 8l4 4 7-7"/>
          </svg>
          {{ submitting ? 'Sending…' : 'Submit' }}
        </button>
        <button class="btn btn-secondary" @click="resetForm">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 8a5 5 0 105-5H5"/><path d="M5 1v4H1"/></svg>
          Clear
        </button>
      </div>

      <!-- Result banner -->
      <div v-if="result" class="result-banner" :class="result.type">
        <svg v-if="result.type === 'success'" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm3.3 5.3l-4 4a1 1 0 01-1.4 0l-2-2 1.4-1.4L7 8.6l3.3-3.3 1.4 1.4z"/></svg>
        <svg v-else viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm-.75 4h1.5v4.5h-1.5V5zm0 5.5h1.5V12h-1.5v-1.5z"/></svg>
        {{ result.message }}
      </div>

    </main>
  </div>

  <div id="snackbar" ref="snackbar"></div>
</div>

<script>
const FLAGS = [
  { id: 'OFPMF_KBPS',  label: 'Rate in Kbps',        hint: 'Kilobits per second' },
  { id: 'OFPMF_PKTPS', label: 'Rate in pps',          hint: 'Packets per second'  },
  { id: 'OFPMF_BURST', label: 'Do Burst Size',        hint: 'Enable burst metering' },
  { id: 'OFPMF_STATS', label: 'Collect Statistics',   hint: 'Enable stats collection' },
];

const OPERATIONS = [
  { value: 'add', label: 'Add'    },
  { value: 'mod', label: 'Modify' },
  { value: 'del', label: 'Delete' },
];

function emptyBand() {
  return { type: 'DROP', rate: 0, burst: 0, prec: 0 };
}

function defaultForm() {
  return {
    dpid:      '',
    meter_id:  null,
    operation: 'add',
    flags: {
      OFPMF_KBPS:  true,
      OFPMF_PKTPS: false,
      OFPMF_BURST: false,
      OFPMF_STATS: false,
    },
    bands: [emptyBand()],
  };
}

new Vue({
  el: '#app',

  data: {
    form:       defaultForm(),
    switches:   [],
    submitting: false,
    result:     null,
    errors:     {},
    hasImport:  false,
    currentTime: '',
    clockTimer:  null,
    FLAGS,
    OPERATIONS,
  },

  methods: {
    // ── Init ──────────────────────────────────────────
    async loadSwitches() {
      try {
        const res = await fetch('/data?list=switches');
        if (!res.ok) throw new Error();
        const data = await res.json();
        this.switches = Object.values(data || {});
        if (this.switches.length === 1) this.form.dpid = this.switches[0];
      } catch(e) {
        this.showMessage('Cannot read switches from controller.');
      }
    },

    // ── Flags ─────────────────────────────────────────
    toggleFlag(id) {
      if (this.form.flags[id]) {
        // Turning off → just do it
        this.form.flags[id] = false;
        return;
      }

      // Turning on → enforce exclusion first
      if (id === 'OFPMF_KBPS') {
        this.form.flags.OFPMF_PKTPS = false;
      } else if (id === 'OFPMF_PKTPS') {
        this.form.flags.OFPMF_KBPS = false;
      }

      this.form.flags[id] = true;
    },


    // ── Bands ─────────────────────────────────────────
    addBand() {
      this.form.bands.push(emptyBand());
    },
    removeBand(idx) {
      this.form.bands.splice(idx, 1);
    },
    onBandTypeChange(band) {
      if (band.type !== 'DSCP_REMARK') band.prec = 0;
    },

    // ── Validation ────────────────────────────────────
    validate() {
      const e = {};
      if (!this.form.dpid)     e.dpid     = 'Please select a switch.';
      if (!this.form.meter_id || this.form.meter_id < 1 || this.form.meter_id > 4294901760)
        e.meter_id = 'Meter ID must be between 1 and 4294901760.';
      if (!this.form.flags.OFPMF_KBPS && !this.form.flags.OFPMF_PKTPS)
        e.flags = 'Either Kbps or pps rate flag must be selected.';
      if (this.form.operation !== 'del' && this.form.bands.length === 0)
        e.bands = 'At least one meter band is required.';
      this.errors = e;
      return Object.keys(e).length === 0;
    },

    // ── Build payload ─────────────────────────────────
    buildPayload() {
      const bandsList = this.form.bands
        .filter(b => b.type.trim() !== '')
        .map(b => [b.type.trim(), b.rate, b.burst, b.prec]);

      return {
        dpid:          parseInt(this.form.dpid),
        operation:     this.form.operation,
        meter_id:      this.form.meter_id,
        OFPMF_KBPS:    this.form.flags.OFPMF_KBPS,
        OFPMF_PKTPS:   this.form.flags.OFPMF_PKTPS,
        OFPMF_BURST:   this.form.flags.OFPMF_BURST,
        OFPMF_STATS:   this.form.flags.OFPMF_STATS,
        bands:         bandsList,
      };
    },

    // ── Submit ────────────────────────────────────────
    async submitForm() {
      this.result = null;
      if (!this.validate()) return;
      this.submitting = true;
      try {
        const payload = this.buildPayload();
        const res = await fetch('/meterform', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(payload),
        });
        const data = await res.json();
        const msg  = data.message || (res.ok ? 'Request sent successfully.' : 'Controller returned an error.');
        this.result = { type: res.ok ? 'success' : 'error', message: msg };
        this.showMessage(msg);
      } catch(e) {
        this.result = { type: 'error', message: 'No response from controller.' };
        this.showMessage('No response from controller.');
      } finally {
        this.submitting = false;
      }
    },

    // ── Reset ─────────────────────────────────────────
    resetForm() {
      const currentDpid = this.form.dpid;
      this.form   = defaultForm();
      this.form.dpid = currentDpid;  // keep switch selection
      this.errors = {};
      this.result = null;
    },

    // ── Import from session storage ───────────────────
    importFromSession() {
      try {
        const raw  = sessionStorage.getItem('meter');
        const data = JSON.parse(raw);
        if (!data) return;

        if (data.dpid)      this.form.dpid      = String(data.dpid);
        if (data.meter_id)  this.form.meter_id  = data.meter_id;
        if (data.flags) {
          Object.keys(data.flags).forEach(k => {
            if (k in this.form.flags) this.$set(this.form.flags, k, data.flags[k]);
          });
        }
        if (Array.isArray(data.bands) && data.bands.length) {
          this.form.bands = data.bands.map(b => ({
            type:  Array.isArray(b) ? b[0] : (b.type  || 'DROP'),
            rate:  Array.isArray(b) ? b[1] : (b.rate  || 0),
            burst: Array.isArray(b) ? b[2] : (b.burst || 0),
            prec:  Array.isArray(b) ? b[3] : (b.prec  || 0),
          }));
        }

        sessionStorage.removeItem('meter');
        this.hasImport = false;
        this.showMessage('Meter entry imported.');
      } catch(e) {
        this.showMessage('Failed to import meter entry.');
      }
    },

    // ── Helpers ───────────────────────────────────────
    showMessage(msg) {
      const el = this.$refs.snackbar;
      el.textContent = msg;
      el.classList.remove('show');
      void el.offsetWidth;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3200);
    },
    updateClock() {
      this.currentTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    },
  },

  mounted() {
    this.loadSwitches();
    this.hasImport = !!sessionStorage.getItem('meter');
    this.updateClock();
    this.clockTimer = setInterval(this.updateClock, 1000);
  },

  beforeDestroy() {
    clearInterval(this.clockTimer);
  },
});
</script>
</body>
</html>
